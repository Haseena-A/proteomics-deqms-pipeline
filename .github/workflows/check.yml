name: R Pipeline Check

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  check:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.3'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev \
            libharfbuzz-dev libfribidi-dev libfreetype6-dev libpng-dev \
            libtiff5-dev libjpeg-dev

      - name: Cache R packages
        uses: actions/cache@v3
        with:
          path: ${{ env.R_LIBS_USER }}
          key: ${{ runner.os }}-r-4.3-${{ hashFiles('DESCRIPTION') }}
          restore-keys: ${{ runner.os }}-r-4.3-

      - name: Install BiocManager
        run: |
          Rscript -e "install.packages('BiocManager', repos='https://cloud.r-project.org')"

      - name: Install required packages
        run: |
          Rscript -e "
          BiocManager::install(c('limma', 'DEqMS', 'ComplexHeatmap', 'matrixStats'),
                               update = FALSE, ask = FALSE)
          install.packages(c('ggplot2', 'ggrepel', 'circlize'),
                           repos = 'https://cloud.r-project.org')
          "

      - name: Check R scripts can be parsed
        run: |
          Rscript -e "
          files <- list.files(c('R', 'scripts'), pattern='\\\\.R$', full.names=TRUE)
          for (f in files) {
            cat('Checking:', f, '\n')
            tryCatch(parse(file = f), error = function(e) stop('Parse error in ', f, ': ', e))
          }
          cat('All files parsed successfully\n')
          "

      - name: Validate data templates
        run: |
          Rscript -e "
          psm  <- read.csv('data/example/psm_template.csv')
          meta <- read.csv('data/example/metadata_template.csv')
          stopifnot('gene' %in% colnames(psm))
          stopifnot('condition' %in% colnames(meta))
          stopifnot('sample' %in% colnames(meta))
          cat('Data templates valid\n')
          "
